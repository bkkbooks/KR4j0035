body:
  text: 審齋詞宋王千秋撰賀新郎石城弔古弔古城頭去正髙秋霜晴木落路通洲渚欲問紫髯分鼎事只有荒祠煙樹巫覡去乆無簫鼓霸業荒凉遺堞墜但蒼崖日閲征帆渡興與廢幾今古夕陽細草空凝竚試追思當時子敬用心良誤要約劉郎銅雀醉底事遽爭荆楚遂但見蜀吳烽舉致使五官伸脚睡喚諸兒畫取長陵土遺此恨欲誰語沁園春晁以道侍郎生日荳蔲嬌春煙花羞暖物華漸嘉也不須鶯怨桃封絳蕚不須蜂恨蘭鬱金芽料是東君都將和氣分付清豐詩禮家充閭慶有青氊事業丹鳳才華乗槎早上雲霞侍祠甘泉瞻羽車試笑憑熊軾嘉禾合穗進思魚鑰菡蓞駢花蕭冦勲名龔黄模様入拜行趨堤上沙今宵裏且觥船滿棹醉㡌欹斜風流子夜乆燭花暗仙翁醉豐頰縷紅霞正三行鈿袖一聲金縷捲茵停舞側火分茶笑盈盈濺湯温翠盌折印啟緗紗玉笋緩揺雲頭初起竹龍停戰雨脚㣲斜清風生兩腋塵埃盡留白雪長黄芽解使芝眉長秀潘髩休華想竹宫異日衮衣寒夜小團分賜新樣金花還記玉麟春色曽在仙家醉蓬莱送湯正歌塵驚夜鬬乳回甘暫醒還醉再煮銀瓶試長松風味玉手磨香鏤檀舞在夀星光裏翠袖㣲揎氷甆對捧神仙標致記得拈時吉祥曽許一飲須教百年千嵗況有隂功在遍江東桃李紫府春長鳳池天近㸔提攜雲耳積善堂前年年笑語玉簮珠履西江月心事幾多白髪客情無數青山㢘纎細雨褪餘寒正是花期酒限一自缾簮信杳空留鈿帶香殘我今多病寄江干痩似東陽也慣又老去頻驚節物亂来依舊江山清明雨過杏花寒紅紫芳菲何限春病無人消遣芳心有酒摧殘此情拍手問闌干為甚多愁我慣南歌子夀廣文鵲起驚紅雨潮生漲碧瀾水晶城館月方圓誰喚騎鯨仙伯下三山筆勢翔鸞媚詞鋒射斗寒向来文價重賢闗便令披風支月紫薇間虞美人寄李公定流蘇斗帳泥金額我亦花前客謫仙標韻勝瓊枝一詠一觴常是得􅇷隨自從風借雲帆便冷落青樓宴石橋風月也應猜過盡中秋不見晚歸来念奴嬌荷葉浦雪中作扁舟東下正嵗華将晚江湖清絶萬㸃寒鴉髙下舞凝住一天雲葉映篠漁村衡茅酒舎淅瀝鳴飛雪壮懷興感悔将釵鳳輕别遥望傑閣層樓明眸穠艷許把同心結東畎西傾渾未定終恐前盟虚設爇獸爐温分霞酒滿此夕歡應狎多情言語又還知共誰説青玉案送人赴黄岡令雪堂不逺臨臯路悵仙伯騎鯨去燕麥桃花更幾度横橋雖在種松無有誰是闗心處解鞍君到冬雖暮傳語無忘曬簑句起手栽花花定許藝香披翠灌紅疏緑趁取清明雨水調歌頭遲日江山好老去倦遨逰好天良夜自恨無地可銷憂豈意綺窻朱戸深鎻雙雙玉樹桃扇避風流未暇泛滄海直欲老温柔解檀槽敲玉釧泛清謳畫樓十二梁塵驚墜綵雲留座上騎鯨仙友笑我胸中磊塊取酒為澆愁一舉千觴盡来日判扶頭減字木蘭花隂簷雪在小雨㢘纎寒又㬠莫上危樓樓迥空低鴈更愁一杯濁酒萬事世間無不有待早歸田欲買田無使鬼錢風流子同雲垂六幕啼烏靜風御玉妃寒漸聲入釣簔色侵書幌似花如絮結陣成團倦逰客一畨詩思苦無算酒腸寛黄竹調悲綺衾人馬豈堪梅蘂索笑巡簷一杯知誰勸空搔首還是憶舊青氊問素娥早晚光射江干待醉披鶴氅髙吟氷柱剡溪何妨乗興空還只恐櫓聲咿軋棲鳥難安憶秦娥雲破碧作霜天氣西風急西風急一行征鴈數聲横笛挑燈試問今何夕柔腸底事愁如織愁如織紫苔庭院悄無人跡又雲葉舞寒林淺淡圍煙雨圍煙雨三三兩兩鴈投沙渚征帆暫落知何所短蓬靜聴舟人語舟人語夜寒如許客能眠否清平樂吹花何處桃葉江頭路碧錦障泥衝暮雨一霎峭寒如許歸来索酒澆春潮紅秋水増明却是不禁春惱偎人低度歌聲賀新郎短艇横烟渚夢驚回凄凉尚記緑簔鳴雨拍塞愁懷人不解只有黄鸝能語復擬待乗槎重去無奈東君剛留客張碧油緩按香紅舞生怕我頓遐舉故溪冉冉春光度想晚来楊花雲際白蘋無數竹裏樵青應是怪目斷鳴榔去路料為我羞煩鱗羽好趁小蠻針線在按綸巾歸喚松江渡重繋纜醉眠處好事近和李清宇六幕凍雲凝誰翦玉花為雪寒入竹窻茅舎聴琴絃聲絶從他拂面去尋梅香吐是時節歸晚楚天不夜抺牆腰横月又明日發驪駒共起為傳杯緑十嵗女兒嬌小倚琵琶翻曲絶憐啄木欲飛時絃響顫鳴玉雖是未知離恨亦晴峰㣲蹙虞美人琵琶絃畔春風面曽向尊前見彩雲初散燕空樓蕭寺相逄各認兩眉愁舊時曲譜曽翻否好在曹綱手老来心緒怯么絃出塞移船莫遣到愁邉水調歌頭九日壯日遇重九躍馬縱歡遊如今何事多感雙髩不禁秋目斷五陵臺路無復臨髙千騎鼓吹簇輕裘霜露下南國淮漢繞神州釣松鱸斟郢酒聴吳謳壮心鑠盡今夕重見紫茱羞月落笳鳴沙磧烽盡人耕榆塞此志恐悠悠擬欲墮清淚生怕菊花愁菩薩蠻荼䕷流鶯不許青春住催得春歸花亦去何物慰儂懷荼䕷最後開青衫氷雪面細雨斜橋見莫浪送香来等閑蜂蝶猜驀山溪海棠清明池館側卧簾初卷還是海棠開睡未足餘酲滿面低頭不語渾似怨東風心始吐又驚飛交現垂楊眼少陵情淺花草題評徧賦得惡因縁沒一字聊通繾綣黄昏時候凝竚怯春寒籠翠袖減豐肌脉脉情何限漁家傲簡張徳共黄栗留鳴春已暮西園無著清隂處昨日驟寒風又雨花良苦信縁吹落誰家去病起日長無意緒等閒還與春相負魏紫姚黄無恙否栽培取開時我欲聴金縷念奴嬌水仙開花借水信天姿髙勝都無俗格玉隴娟娟黄㸃小道書玉女鼻端有黄㸃依約西湖清魄緑帶垂腰碧簮篸髻索句撩元白西清㣲笑為渠模寫香色常記月底風前水沈肌骨痩不禁憐惜生怕因循紛委地仙去難尋蹤跡縹檻闕彤幃宻䕶不肯輕抛釋等差休問未容梅闕懸闕生查子枝垂雲碧長心展鵝黄嫩無力倚闌時掃盡漫山杏玲瓏影結隂藴藉香成陣誰為祝東風更莫催花信又花飛錦繡香茗碾槍旗嫩是處緑連雲又摘斑斑杏愁來苦酒腸老去閑花陣燕子不知人尚説行雲信又鶯聲恰恰嬌草色纎纎嫩詩髩已驚霜鏡葉慵拈杏因何積恨山著底攻愁陣春事到荼䕷還是無音信又睡起髻雲鬆枕印香腮嫩愁思到眉尖齒軟嘗新杏都無魚鴈書又過鶯花陣寛盡縷金衣説與伊爭信又春江波面渾春岸蘆芽嫩不見木蘭舟羞帶駢枝杏輕綃揾淚痕急雨衝花陣暗禱紫姑神覓箇巴陵信又雄姿畫麒麟朽骨分螻蟻爭似及生前常為鶯花醉雲山靜有情天地寛無際且放兩眉開萬事非人意又功名竹上魚富貴槐根蟻三萬六千塲排日扶頭醉髙懷隘世間壮氣横天際常是惜春殘不㑹東君意解佩令木犀花兒不大葉兒不美只一叚風流標致淡淡梳粧已賽過騷人蘭芷古龍涎怎敢氣開時無奈風斜雨細壞得来零零碎碎著意收拾安頓在膽瓶兒裏且圖敎平聲夢魂旖旎清平樂喚雲且住莫作龍池舞五月人間須好雨為掃無邉煩暑畦秧針緑重生壺天表裏俱清林外桔橰閒掛省渠多少心情憶秦娥闌干側當時我亦凝香客凝香客而今老大髩蒼頭白揚州夢覺渾無迹舊逰英俊今南北今南北斷鴻沈鯉更無消息西江月夢幻影泡有限風花雪月無涯莫分粗俗與精華日醉石間松下菜盡鄰家解與杯空稚子能賖通幽即步儘横斜不問墩猶姓謝臨江仙者也之乎真太錯甘心吞棘吞蓬有無俱盡見真空爐錐難自薦闗捩只心通野鶴孤雲元自在剛論隠豹㝠鴻此身今在幻人宫要将驢佛我分付馬牛風浣溪沙殢玉偎香倚翠屏當年嘗喚在凝春豈知雲雨散逡巡不止恨伊唯準擬也先傷我太因循而今頭過總休論又親染柔毛劈彩牋自憐探平聲得惡因縁一尊重許笑凭肩往事已同花屢褪新歡聞似月常圓休休休更苦縈牽瑞鶴仙征鴻翻塞影悵悲秋人老渾無佳興鳴蛩問酒病更堆積愁腸摧殘詩髩起尋芳徑菊羞人依叢半隠又豈知虚度重陽浪濶渺無歸恨無定登髙人逺戲馬臺前閒怨歌誰聴香肩醉凭鎮常是笑得醒到如今何在西風凝竚冠也無人為正㸔他門對揷茱茰恨長怨永又韓南澗生日紅消梅雨潤正榴花照眼荷香成陣爐薰炷芳燼記于門今日長庚占慶文摛艷錦笑班楊用字未穩果青雲快上黄屝地闕譽髙英俊名盛都期持槖却借乘軺布宣寛政除書已進歸寵異侍嚴近且金船滿酌雲翹低祝闕比椿齡更永任月斜未放笙歌翠桐轉影滿江紅和諸公賞心亭待月樓壓層城斜陽斂帆收南浦最好是長江澄練逺山新雨闕留連邀皓月一堂髙敞袪隆暑問從来佳賞有誰同應難數舟横渡車闐路催酒進麾燈去放姮娥照座不須簾阻已見天清無屏翳更須潮上喧闐技㸔波光撩亂上檣竿龍蛇舞感皇恩天氣過燒燈初閒人倦曉色曈曨繡簾捲聚星歌扇一簇雪香瓊軟夀杯爭安把從他滿低低笑祝年齡遐逺息駕無由遂公願東風吹喜又做眉黄一㸃便參鵷鷺入常朝殿青玉案鳴鼉欲引魚龍戲先自作長江儡頭管一聲天外起羣仙俱上有人殊麗認得分明是欲相問勞来無計但隔爐煙屢凝睇擲我胸前方寸紙擁翹欲去顰蛾還住不盡徘徊意醉落魄驚鷗撲蓛蕭蕭卧聴鳴幽屋窻明怪得雞啼速牆角爛平聲斑一半露松緑歌樓管竹誰翻曲丹屑氷面噴餘馥遺珠滿地無人掬歸著紅靴踏碎一街玉桃源憶故人移燈背月穿金縷合色鞋兒初做却被阿誰将去鸚鵡能言語朝来半作凌波步可惜孤鸞侣若念玉纎辛苦早與成雙取水調歌頭趙可大生日披錦泛江客横槊賦詩人氣吞宇宙當擁千騎靜邊塵何事折腰執版乆在泛蓮幕府深覺負平生踉蹡衆人底欲語復吞聲慶垂弧期賜杖酒深傾願君大耐碧眸丹頰百千齡用即經綸天下不用歸謀三徑一笑友淵明出處兩俱得斥鷃亦鵾鵬鷓鴣天圓子翠杓銀鍋饗夜逰萬燈初上月當樓溶溶琥珀流匙滑璨璨蠙珠著面浮香入手煖生甌依然京國舊風流翠娥且放杯行緩甘味雖濃欲少留又蒸蠒比屋燒燈作好春先須歌舞賽蠺神便将簇上如霜樣来餉尊前似玉人絲饀細粉肌匀從他犀筯破花紋慇懃又作梅羮送酒力消除笑語新浣溪沙焦油買市宣和預賞時流蘓垂盖寳燈圍小鐺烹玉鼔聲隨金彈玲瓏今夕是鼇山縹緲昔逰非馬行遺老想沾衣又科斗燈火闌珊欲曉時夜逰人倦總思歸更須氷蛹替挼絲玉篆古文光燦爛花垂零露影參差月寒煙淡最相宜好事近夀黄仲符人物又無雙餘事錦機閒織著就兩都新賦笑一生聨輯来年秋色起鵬程一舉上晴碧須洗玉荷為夀助穿楊飛的喜遷鸎春前臘尾問誰㑹開解幽人心裏映竹精神凌風標致姑射昔聞今是試粧競㸔吹面寄驛勝傳緘紙逈瀟洒更香来林表枝横溪底誰為停征騎評蕙品蘭俱恐非同里天意深憐花神偏巧特為翦氷裁水擬喚緑衣来舞只許蒼官相倚醉眠穏儘參横月落留連行李事見栁子厚龍城録又玉龍垂尾望闕角岧嶤如侵雲裏明璧榱題白銀階陛平日世間無是靜乆聲鳴檻竹夜半色侵窻紙最奇處盡巧粧枝上低飛簷底當為呼㳺騎嗾犬擎蒼腰箭隨隣里藉草烹鮮枯枝煎茗㸃化玉花為水未挹瑶臺風露且借璚林棲倚眩銀海待斜披鶴氅騎鯨尋李滿庭芳二色梅蘂小雕瓊花明鎔蠟天教一旦俱芳豐臞雖異皆熨水沈香應笑紛紅墮紫初未識調粉塗黄凭肩處金鈿玉珥不數夀陽粧思量誰比似酥裁笋指蜜翦蜂房又何須酣酒重暖瑶觴且放側堆金縷驪山冷来浴温湯誰題品青枝緑蕚俱未許升堂訴衷情登雨花臺二分濃緑一分紅春事若為窮醉袖罥香霑粉公挽我我扶公欹短㡌吐長虹擬凌風布金堆裏疊翠屏中雲月輕籠臨江仙栁巷鶯啼春未曉畫堂環珮珊珊薰爐烘煖鷓鴣斑夀杯須斗酌舞袖正弓彎未説珥貂横玊事勲名且勒燕然歸来方卜五湖閒年年花月夜沈醉綺羅間浣溪沙白紵衫子疊雪裁霜越紵勻美人親翦稱腰身暑天寜數越羅春兩臂輕籠燕玉膩一胸斜露塞酥温不教香汗濕歌塵西江月小鹿鳴四俊鄉書薦鶚一䕫曹府登賢明年春晚栁如煙㸔取臚傳金殿冊府牙籖晝閲詞垣紫誥宵傳青樓買酒定無縁且放金杯瀲灔虞美人和姚伯和風花南北知何據常是将春負海棠開盡野棠開疋馬﨑嶇還入亂山来尊前人物勝前度誰記桃花句老来情事不禁濃玉珮行雲切莫易丁東又代簡督伯和借戰國策要津去去無由據已分平生負擬将懷抱向誰開萬水千山聊為借書来𤣥都晝永閑難度欲正書中句黄琮丹璧已磨濃發篋煩君早送過橋東謁金門次李聖予月中韻春漠漠閒盡綺窻雲幙悔不車輪生四角却成縁分薄想畫鴉兒方學小蹙恨人無託不道月明誰共酌這般情味惡又諸公要予出郊春漠漠何處養花張幙佩冷香殘天一角忍㸔羅袖薄兩兩鴛鴦難學六六錦鱗空託趂有餘妍須細酌東風情性惡㸃綘唇劉公寳生日玉立霞升縱談劉尹髙支許待為霖雨小駐紅蓮府鶴健松堅鴻寳初非誤𤣥都路桃花栽取来㸔千千度又春日何處春来試煩君向垂楊㸔萬條輕線已借鵝黄染弄日揺風按舞知誰見陽闗逺一杯休勸且放脩眉展又何處春来試煩君向梅梢㸔夀陽粧面漏泄春何限冷蘂疎枝似恨春猶淺收羌管莫驚香散留副闕和願又何處春来試煩君向釵頭㸔舞翻飛燕已拂春風面白玉圓鈿酌酒殷勤勸深深願願君長健嵗與春相見又何處春来試煩君向盤中㸔韭黄猶短玉指呵寒翦犀筯調匀更為雙雙卷情何限怕寒須暖先酌黄金盞水調歌頭席上呈梁次張筆力捲鯨海人物冠麟臺嚮来朱邸千字不省有驚雷人似曲江風韻剛要重来持節不道玉堂開草詔坐扛鼎𤨏屑掃尊罍金錯落貂掩映玉崔嵬㸔公談笑長河千里靜氛埃散馬晝閒榆塞辮髪春趍瑶陛都出濟川才老子尚頑健東閣亦時来瑞鶴仙張四益生日夷吾在江左罄氊裘俱讋笑清邉𤨏遺民冀巾裹箇規模欲繼外人誰可一花兩果晚占熊材能更夥試頒春便有驩謡聲接月鞍烟柂馺娑已傳丹詔催上文石論炙輠槖弓笴九域措安妥待緇衣重詠履封光繼緑野從教晝鎻問黒頭當日三公可能似我滿江紅水滿方塘三日雨曉来方足闌干外錦䙀初脱新篁森玉沃葉未乾鳩婦去餘花時墜蜂兒逐認去年乳燕又雙雙飛華屋紅豆恨歸誰促青鸞夢驚難續想多情猶記碧牋新曲白髪欺人雖已老短襟揾黛存餘馥且如今一笑總休論杯行速西江月璀璨雕籠灑筆聮翩薦鶚飛書翻階紅藥試粧梳管取不言温樹容我一杯為夀㸔君九萬鵬圖髻鬟人小串璣珠嵗嵗緑窻朱戸審齋詞
