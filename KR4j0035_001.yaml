body:
  text: 審齊詞宋王千秋撰賀新郎石城弔古弔古城頭去正髙秋霜晴木落路通洲渚欲問紫髯分鼎事只有荒祠煙樹巫覡去久無簫鼓霸業荒凉遺堞墜但蒼崖日閲征帆渡興與廢幾今古夕陽細草空凝竚試追思當時子敬用心良誤要約劉郎銅雀醉底事遽爭荆楚遂但見蜀吳烽舉致使五官伸腳睡喚諸兒畫取長陵土遺此恨欲誰語沁園春朝以道侍郎生日豆蔲嬌春煙花羞暖物華漸嘉也不須鶯怨桃封絳蕚不須蜂恨蘭鬱金芽料是東君都將和氣分付清豐詩禮家充閭慶有青氊事業丹鳳才華乘槎早上雲霞侍祠甘泉瞻羽車試笑憑熊軾嘉禾合穗進思魚鑰菡蓞駢花蕭冦勳名龔黃模樣入拜行趨堤上沙今宵裏且觥船滿棹醉帽欹斜風流子夜久燭花暗仙翁醉豐頰縷紅霞正三行鈿袖一聲金縷捲茵停舞側火分茶笑盈盈濺湯溫翠碗折印啓緗紗玉笋緩搖雲頭初起竹龍停戰雨腳微斜清風生兩腋塵埃盡留白雪長黃芽解使芝眉長秀潘鬢休華想竹宫異日衮衣寒夜小團分賜新樣金花還記玉麟春色曽在仙家醉蓬萊送湯正歌塵驚夜鬬乳回甘暫醒還醉再煮銀瓶試長松風味玉手磨香鏤檀舞在夀星光裏翠袖微揎氷瓷對捧神仙標致記得拈時吉祥曽許一飲須教百年千嵗況有隂功在遍江東桃李紫府春長鳳池天近看提攜雲耳積善堂前年年笑語玉簮珠履西江月心事幾多白髮客情無數青山廉纎細雨褪餘寒正是花期酒限一自瓶簮信杳空留鈿帶香殘我今多病寄江干瘦似東陽也慣又老去頻驚節物亂來依舊江山清明雨過杏花寒紅紫芳菲何限春病無人消遣芳心有酒摧殘此情拍手問闌干為甚多愁我慣南歌子夀廣文鵲起驚紅雨潮生漲碧瀾水晶城館月方圓誰喚騎鯨仙伯下三山筆勢翔鸞媚詞鋒射斗寒向來文價重賢關便令披風支月紫薇間虞美人寄李公定流蘇斗帳泥金額我亦花前客謫仙標韻勝瓊枝一詠一觴常是得追隨自從風借雲帆便冷落青樓宴石橋風月也應猜過盡中秋不見晚歸來念奴嬌荷葉浦雪中作扁舟東下正嵗華將晚江湖清絶萬㸃寒鴉髙下舞凝住一天雲葉映篠漁村衡茅酒舍淅瀝鳴飛雪壯懷興感悔將叉鳳輕别遙望傑閣層樓明眸穠艷許把同心結東畎西傾渾未定終恐前盟虛設爇獸爐溫分霞酒滿此夕歡應狎多情言語又還知共誰說青玉案送人赴黃岡令雪堂不逺臨臯路悵仙伯騎鯨去燕麥桃花更幾度橫橋雖在種松無有誰是關心處解鞍君到冬雖暮傳語無忘曬簑句起手栽花花定許藝香披翠灌紅疏緑趁取清明雨水調歌頭遲日江山好老去倦遨逰好天良夜自恨無地可銷憂豈意綺窗朱戶深鎖雙雙玉樹桃扇避風流未暇泛滄海直欲老溫柔解檀槽敲玉釧泛清謳畫樓十二梁塵驚墜綵雲留座上騎鯨仙友笑我胸中磊塊取酒為澆愁一舉千觴盡來日判扶頭減字木蘭花隂簷雪在小雨廉纎寒又㬠莫上危樓樓迥空低鴈更愁一杯濁酒萬事世間無不有待早歸田欲買田無使鬼錢風流子同雲垂六幕啼烏靜風御玉妃寒漸聲入釣簔色侵書幌似花如絮結陳成團倦逰客一畨詩思苦無算酒腸寬黃竹調悲綺衾人馬豈堪梅蘂索笑巡簷一杯知誰勸空搔首還是憶舊青氊問素娥早晚光射江干待醉披鶴氅髙吟氷柱剡溪何妨乘興空還只恐櫓聲咿軋棲鳥難安憶秦娥雲破碧作霜天氣西風急西風急一行征鴈數聲橫笛挑燈試問今何夕柔腸底事愁如織愁如織紫苔庭院悄無人跡又雲葉舞寒林淺淡圍煙雨圍煙雨三三兩兩鴈投沙渚征帆暫落知何所短蓬靜聽舟人語舟人語夜寒如許客能眠否清平樂吹花何處桃葉江頭路碧錦障泥衝暮雨一霎峭寒如許歸來索酒澆春潮紅秋水增明却是不禁春惱偎人低度歌聲賀新郎短艇橫烟渚夢驚回凄凉尚記緑簔鳴雨拍塞愁懷人不解只有黃鸝能語復擬待乘槎重去無奈東君剛留客張碧油緩按香紅舞生怕我頓遐舉故溪冉冉春光度想晚來楊花雲際白蘋無數竹裏樵青應是怪目斷鳴榔去路料為我羞煩鱗羽好趁小蠻針線在按綸巾歸喚松江渡重繫纜醉眠處好事近和李清宇六幕凍雲凝誰翦玉花為雪寒入竹窗茅舍聽琴絃聲絶從他拂面去尋梅香吐是時節歸晚楚天不夜抹牆腰橫月又明日發驪駒共起為傳杯緑十嵗女兒嬌小倚琵琶翻曲絶憐啄木欲飛時絃響顫鳴玉雖是未知離恨亦晴峰微蹙虞美人琵琶絃畔春風面曽向尊前見彩雲初散燕空樓蕭寺相逄各認兩眉愁舊時曲譜曽翻否好在曹綱手老來心緒怯么絃出塞移船莫遣到愁邉水調歌頭九日壯日遇重九躍馬縱歡遊如今何事多感雙鬢不禁秋目斷五陵臺路無復臨髙千騎鼓吹簇輕裘霜露下南國淮漢繞神州釣松鱸斟郢酒聽吳謳壯心鑠盡今夕重見紫茱羞月落笳鳴沙磧烽盡人耕榆塞此志恐悠悠擬欲墮清淚生怕菊花愁菩薩蠻荼䕷流鶯不許青春住催得春歸花亦去何物慰儂懷荼䕷最後開青衫氷雪面細雨斜橋見莫浪送香來等間蜂蝶猜驀山溪海棠清明池館側卧簾初卷還是海棠開睡未足餘酲滿面低頭不語渾似怨東風心始吐又驚飛交現垂楊眼少陵情淺花草題評遍賦得惡因緣沒一字聊通繾綣黃昏時候凝竚怯春寒籠翠袖減豐肌脉脉情何限漁家傲簡張德共黃栗留鳴春已暮西園無著清隂處昨日驟寒風又雨花良苦信緣吹落誰家去病起日長無意緒等閒還與春相負魏紫姚黃無恙否栽培取開時我欲聽金縷念奴嬌水仙開花借水信天姿髙勝都無俗格玉隴娟娟黃㸃小道書玉女鼻端有黃㸃依約西湖清魄緑帶垂腰碧簮篸髻索句撩元白西清微笑為渠模寫香色常記月底風前水沈肌骨瘦不禁憐惜生怕因循紛委地仙去難尋蹤跡縹檻闕彤幃密護不肯輕拋釋等差休問未容梅闕懸闕生查子枝垂雲碧長心展鵝黃嫩無力倚闌時掃盡漫山杏玲瓏影結隂藴藉香成陳誰為祝東風更莫催花信又花飛錦繡香茗碾槍旗嫩是處緑連雲又摘斑斑杏愁來苦酒腸老去間花陳燕子不知人尚說行雲信又鶯聲恰恰嬌草色纎纎嫩詩鬢已驚霜鏡葉慵拈杏因何積恨山著底攻愁陳春事到荼䕷還是無音信又睡起髻雲鬆枕印香腮嫩愁思到眉尖齒軟嘗新杏都無魚鴈書又過鶯花陳寬盡縷金衣說與伊爭信又春江波面渾春岸蘆芽嫩不見木蘭舟羞帶駢枝杏輕綃揾淚痕急雨衝花陳暗禱紫姑神覓箇巴陵信又雄姿畫麒麟朽骨分螻蟻爭似及生前常為鶯花醉雲山靜有情天地寬無際且放兩眉開萬事非人意又功名竹上魚富貴槐根蟻三萬六千場排日扶頭醉髙懷隘世間壯氣橫天際常是惜春殘不㑹東君意解佩令木犀花兒不大葉兒不美只一假風流標致淡淡梳粧已賽過騷人蘭芷古龍涎怎敢氣開時無奈風斜雨細壞得來零零碎碎著意收拾安頓在膽瓶兒裏且圖教平聲夢魂旖旎清平樂喚雲且住莫作龍池舞五月人間須好雨為掃無邉煩暑畦秧針緑重生壺天表裏俱清林外桔橰閒掛省渠多少心情憶秦娥闌干側當時我亦凝香客凝香客而今老大鬢蒼頭白揚州夢覺渾無迹舊逰英俊今南北今南北斷鴻沈鯉更無消息西江月夢幻影泡有限風花雪月無涯莫分粗俗與精華日醉石間松下菜盡鄰家解與杯空稚子能賖通幽即步儘橫斜不問墩猶姓謝臨江仙者也之乎真太錯甘心吞棘吞蓬有無俱盡見真空爐錐難自薦關捩只心通野鶴孤雲元自在剛論隱豹冥鴻此身今在幻人宫要將驢佛我分付馬牛風浣溪沙殢玉偎香倚翠屏當年嘗喚在凝春豈知雲雨散逡巡不止恨伊唯準擬也先傷我太因循而今頭過總休論又親染柔毛劈彩箋自憐探平聲得惡因緣一尊重許笑憑肩往事已同花屢褪新歡聞似月常圓休休休更苦縈牽瑞鶴仙征鴻翻塞影悵悲秋人老渾無佳興鳴蛩問酒病更堆積愁腸摧殘詩鬢起尋芳徑菊羞人依叢半隱又豈知虛度重陽浪濶渺無歸恨無定登髙人逺戲馬臺前閒怨歌誰聽香肩醉憑鎮常是笑得醒到如今何在西風凝竚冠也無人為正看他門對插茱茰恨長怨永又韓南澗生日紅消梅雨潤正榴花照眼荷香成陳爐薰炷芳燼記于門今日長庚占慶文摛艷錦笑班楊用字未穩果青雲快上黃屝地闕譽髙英俊名盛都期持槖却借乘軺布宣寬政除書已進歸寵異侍嚴近且金船滿酌雲翹低祝闕比椿齡更永任月斜未放笙歌翠桐轉影滿江紅和諸公賞心亭待月樓壓層城斜陽斂帆收南浦最好是長江澄練逺山新雨闕留連邀皓月一堂髙敞袪隆暑問從來佳賞有誰同應難數舟橫渡車闐路催酒進麾燈去放姮娥照座不須簾阻已見天清無屏翳更須潮上喧闐技看波光撩亂上檣竿龍蛇舞感皇恩天氣過燒燈初閒人倦曉色曈曨繡簾捲聚星歌扇一簇雪香瓊軟夀杯爭安把從他滿低低笑祝年齡遐逺息駕無由遂公願東風吹喜又做眉黃一㸃便參鵷鷺入常朝殿青玉案鳴鼉欲引魚龍戲先自作長江儡頭管一聲天外起羣仙俱上有人殊麗認得分明是欲相問勞來無計但隔爐煙屢凝睇擲我胸前方寸紙擁翹欲去顰蛾還住不盡徘徊意醉落魄驚鷗撲蓛蕭蕭卧聽鳴幽屋窗明怪得雞啼速牆角爛平聲斑一半露松緑歌樓管竹誰翻曲丹屑氷面噴餘馥遺珠滿地無人掬歸著紅靴踏碎一街玉桃源憶故人移燈背月穿金縷合色鞋兒初做却被阿誰將去鸚鵡能言語朝來半作凌波步可惜孤鸞侣若念玉纎辛苦早與成雙取水調歌頭趙可大生日披錦泛江客橫槊賦詩人氣吞宇宙當擁千騎靜邊塵何事折腰執版久在泛蓮幕府深覺負平生踉蹡衆人底欲語復吞聲慶垂弧期賜杖酒深傾願君大耐碧眸丹頰百千齡用即經綸天下不用歸謀三徑一笑友淵明出處兩俱得斥鷃亦鵾鵬鷓鴣天圓子翠杓銀鍋饗夜逰萬燈初上月當樓溶溶琥珀流匙滑璨璨蠙珠著面浮香入手暖生甌依然京國舊風流翠娥且放杯行緩甘味雖濃欲少留又蒸繭比屋燒燈作好春先須歌舞賽蠺神便將簇上如霜樣來餉尊前似玉人絲饀細粉肌勻從他犀筯破花紋殷勤又作梅羮送酒力消除笑語新浣溪沙焦油買市宣和預賞時流蘇垂蓋寶燈圍小鐺烹玉鼓聲隨金彈玲瓏今夕是鼇山縹眇昔逰非馬行遺老想沾衣又科斗燈火闌珊欲曉時夜逰人倦總思歸更須氷蛹替挼絲玉篆古文光燦爛花垂零露影參差月寒煙淡最相宜好事近夀黃仲符人物又無雙餘事錦機閒織著就兩都新賦笑一生聨輯來年秋色起鵬程一舉上晴碧須洗玉荷為夀助穿楊飛的喜遷鶯春前臘尾問誰㑹開解幽人心裏映竹精神凌風標致姑射昔聞今是試粧競看吹面寄驛勝傳緘紙逈瀟灑更香來林表枝橫溪底誰為停征騎評蕙品蘭俱恐非同里天意深憐花神偏巧特為翦氷裁水擬喚緑衣來舞只許蒼官相倚醉眠穩儘參橫月落留連行李事見栁子厚龍城録又玉龍垂尾望闕角岧嶤如侵雲裏明璧榱題白銀階陛平日世間無是靜久聲鳴檻竹夜半色侵窗紙最奇處盡巧粧枝上低飛簷底當為呼遊騎嗾犬擎蒼腰箭隨鄰里藉草烹鮮枯枝煎茗㸃化玉花為水未挹瑶臺風露且借璚林棲倚眩銀海待斜披鶴氅騎鯨尋李滿庭芳二色梅蘂小雕瓊花明鎔蠟天教一旦俱芳豐臞雖異皆尉水沈香應笑紛紅墮紫初未識調粉塗黃憑肩處金鈿玉珥不數夀陽粧思量誰比似酥裁笋指蜜翦蜂房又何須酣酒重暖瑶觴且放側堆金縷驪山冷來浴溫湯誰題品青枝緑蕚俱未許升堂訴衷情登雨花臺二分濃緑一分紅春事若為窮醉袖罥香霑粉公挽我我扶公欹短帽吐長虹擬凌風布金堆裏疊翠屏中雲月輕籠臨江仙栁巷鶯啼春未曉畫堂環珮珊珊薰爐烘暖鷓鴣斑夀杯須斗酌舞袖正弓彎未說珥貂橫玊事勳名且勒燕然歸來方卜五湖閒年年花月夜沈醉綺羅間浣溪沙白紵衫子疊雪裁霜越紵勻美人親翦稱腰身暑天寧數越羅春兩臂輕籠燕玉膩一胸斜露塞酥溫不教香汗濕歌塵西江月小鹿鳴四俊鄉書薦鶚一䕫曹府登賢明年春晚栁如煙看取臚傳金殿冊府牙籖晝閲詞垣紫誥宵傳青樓買酒定無緣且放金杯瀲灔虞美人和姚伯和風花南北知何據常是將春負海棠開盡野棠開匹馬﨑嶇還入亂山來尊前人物勝前度誰記桃花句老來情事不禁濃玉珮行雲切莫易丁東又代簡督伯和借戰國策要津去去無由據已分平生負擬將懷抱向誰開萬水千山聊為借書來𤣥都晝永間難度欲正書中句黃琮丹璧已磨濃發篋煩君早送過橋東謁金門次李聖豫月中韻春漠漠閒盡綺窗雲幕悔不車輪生四角却成緣分薄想畫鴉兒方學小蹙恨人無託不道月明誰共酌這般情味惡又諸公要豫出郊春漠漠何處養花張幕佩冷香殘天一角忍看羅袖薄兩兩鴛鴦難學六六錦鱗空託趂有餘妍須細酌東風情性惡㸃綘唇劉公寶生日玉立霞升縱談劉尹髙支許待為霖雨小駐紅蓮府鶴健松堅鴻寶初非誤𤣥都路桃花栽取來看千千度又春日何處春來試煩君向垂楊看萬條輕線已借鵝黃染弄日搖風按舞知誰見陽關逺一杯休勸且放修眉展又何處春來試煩君向梅梢看夀陽粧面漏泄春何限冷蘂疏枝似恨春猶淺收羌管莫驚香散留副闕和願又何處春來試煩君向叉頭看舞翻飛燕已拂春風面白玉圓鈿酌酒殷勤勸深深願願君長健嵗與春相見又何處春來試煩君向盤中看韭黃猶短玉指呵寒翦犀筯調勻更為雙雙卷情何限怕寒須暖先酌黃金盞水調歌頭席上呈梁次張筆力捲鯨海人物冠麟臺嚮來朱邸千字不省有驚雷人似曲江風韻剛要重來持節不道玉堂開草詔坐扛鼎瑣屑掃尊罍金錯落貂掩映玉崔嵬看公談笑長河千里靜氛埃散馬晝閒榆塞辮髮春趍瑶陛都出濟川才老子尚頑健東閣亦時來瑞鶴仙張四益生日夷吾在江左罄氊裘俱讋笑清邉瑣遺民冀巾裹箇規模欲繼外人誰可一花兩果晚占熊材能更夥試頒春便有歡謡聲接月鞍烟柂馺娑已傳丹詔催上文石論炙輠槖弓笴九域措安妥待緇衣重詠履封光繼緑野從教晝鎖問黑頭當日三公可能似我滿江紅水滿方塘三日雨曉來方足闌干外錦䙀初脫新篁森玉沃葉未乾鳩婦去餘花時墜蜂兒逐認去年乳燕又雙雙飛華屋紅豆恨歸誰促青鸞夢驚難續想多情猶記碧箋新曲白髮欺人雖已老短襟揾黛存餘馥且如今一笑總休論杯行速西江月璀璨雕籠灑筆聮翩薦鶚飛書翻階紅藥試粧梳管取不言溫樹容我一杯為夀看君九萬鵬圖髻鬟人小串璣珠嵗嵗緑窗朱戶審齊詞
